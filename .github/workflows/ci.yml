name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS build and tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain info
        run: |
          xcodebuild -version
          swift --version

      - name: Build (SwiftPM)
        run: swift build

      - name: Test (SwiftPM)
        run: swift test

  ios:
    name: iOS simulator build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain info
        run: |
          xcodebuild -version
          swift --version

      - name: Build LiveFishTTSiOS for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project LiveFishTTS.xcodeproj \
            -scheme LiveFishTTSiOS \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build
